<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Typing Speed Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      
    }

    body {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #a0a0a0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 40px;
      max-width: 900px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255, 182, 193, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .personal-best {
      color: #ffc0cb;
      font-size: 14px;
    }

    .personal-best-value {
      font-weight: 700;
      font-size: 16px;
      color: #ffb6c1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #707070;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-label {
      font-size: 12px;
      color: #707070;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      border: 1px solid #404040;
      border-radius: 6px;
      background: transparent;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    button:hover {
      border-color: #505050;
      color: #fff;
    }

    button.active {
      background: #0056ff;
      border-color: #0056ff;
      color: #fff;
    }

    button.active.hard {
      background: #4a148c;
      border-color: #4a148c;
    }

    .passage-container {
      background: #0f0f0f;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .passage {
      font-size: 18px;
      line-height: 1.8;
      color: #00d146;
      font-weight: 300;
      text-align: center;
      cursor: text;
      letter-spacing: 0.3px;
    }

    .passage span {
      position: relative;
      transition: all 0.1s ease;
    }

    .passage span.correct {
      color: #00d146;
    }

    .passage span.incorrect {
      color: #ff6b6b;
      background-color: rgba(255, 107, 107, 0.1);
    }

    .passage span.current {
      background-color: rgba(0, 209, 255, 0.3);
      border-bottom: 2px solid #00d1ff;
    }

    .passage span.remaining {
      color: #505050;
    }

    .start-button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .start-button {
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ff8a80 100%);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
    }

    .hint {
      font-size: 12px;
      color: #707070;
      text-align: center;
    }

    .results-container {
      display: none;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .results-container.show {
      display: block;
    }

    .results-header {
      font-size: 28px;
      font-weight: 700;
      color: #00d146;
      margin-bottom: 15px;
    }

    .results-message {
      font-size: 16px;
      color: #a0a0a0;
      margin-bottom: 30px;
    }

    .results-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .results-stat {
      background: #0f0f0f;
      padding: 20px;
      border-radius: 8px;
    }

    .results-stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #ffb6c1;
      margin-bottom: 5px;
    }

    .results-stat-label {
      font-size: 12px;
      color: #707070;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .go-again-button {
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff6b9d 0%, #ff8a80 100%);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .go-again-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 157, 0.3);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .passage {
        font-size: 16px;
      }

      .header {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🖥️ Typing Speed Test</div>
      <div>
        <div class="personal-best">Personal best: <span class="personal-best-value" id="pbWpm">0</span> WPM</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">WPM</div>
        <div class="stat-value" id="wpmDisplay">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracyDisplay">0%</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="timeDisplay">0:00</div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <div class="control-label">Difficulty:</div>
        <div class="button-group">
          <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
          <button class="difficulty-btn" data-difficulty="medium">Medium</button>
          <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">Mode:</div>
        <div class="button-group">
          <button class="mode-btn active" data-mode="timed">Timed (60s)</button>
          <button class="mode-btn" data-mode="passage">Passage</button>
        </div>
      </div>
    </div>

    <div class="passage-container">
      <div class="passage" id="passageDisplay"></div>
    </div>

    <div class="start-button-container" id="startContainer">
      <button class="start-button" id="startBtn">Start Typing Test</button>
      <p class="hint">Or click the text and start typing</p>
    </div>

    <div class="results-container" id="resultsContainer">
      <div class="results-header">Test Complete!</div>
      <div class="results-message">Solid run. Keep pushing to beat your high score.</div>
      <div class="results-stats">
        <div class="results-stat">
          <div class="results-stat-value" id="finalWpm">0</div>
          <div class="results-stat-label">WPM</div>
        </div>
        <div class="results-stat">
          <div class="results-stat-value" id="finalAccuracy">0%</div>
          <div class="results-stat-label">Accuracy</div>
        </div>
        <div class="results-stat">
          <div class="results-stat-value" id="finalChars">0/0</div>
          <div class="results-stat-label">Characters</div>
        </div>
      </div>
      <button class="go-again-button" id="goAgainBtn">Go Again</button>
    </div>
  </div>

  <script>
    // State management
    let state = {
      isTestRunning: false,
      currentDifficulty: 'easy',
      currentMode: 'timed',
      timeElapsed: 0,
      currentPassage: '',
      userInput: '',
      startTime: null,
      timerInterval: null,
      personalBest: localStorage.getItem('personalBest') || 0
    };

    // DOM elements
    const passageDisplay = document.getElementById('passageDisplay');
    const startBtn = document.getElementById('startBtn');
    const startContainer = document.getElementById('startContainer');
    const resultsContainer = document.getElementById('resultsContainer');
    const wpmDisplay = document.getElementById('wpmDisplay');
    const accuracyDisplay = document.getElementById('accuracyDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const pbWpmDisplay = document.getElementById('pbWpm');
    const difficultyBtns = document.querySelectorAll('.difficulty-btn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const goAgainBtn = document.getElementById('goAgainBtn');

    // Load personal best
    pbWpmDisplay.textContent = state.personalBest;

    // Difficulty and Mode selection
    difficultyBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!state.isTestRunning) {
          difficultyBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentDifficulty = btn.dataset.difficulty;
          resetTest();
        }
      });
    });

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!state.isTestRunning) {
          modeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.currentMode = btn.dataset.mode;
          resetTest();
        }
      });
    });

    // Load passage from data.json
    async function loadPassage() {
      try {
        const response = await fetch('./data.json');
        const data = await response.json();
        const passages = data[state.currentDifficulty];
        const randomPassage = passages[Math.floor(Math.random() * passages.length)];
        state.currentPassage = randomPassage.text;
        renderPassage();
      } catch (error) {
        console.error('Error loading passage:', error);
        state.currentPassage = 'The quick brown fox jumps over the lazy dog. This is a fallback passage for when the data cannot be loaded.';
        renderPassage();
      }
    }

    // Render passage with character highlighting
    function renderPassage() {
      let html = '';
      for (let i = 0; i < state.currentPassage.length; i++) {
        const char = state.currentPassage[i];
        let className = 'remaining';

        if (i < state.userInput.length) {
          if (state.userInput[i] === char) {
            className = 'correct';
          } else {
            className = 'incorrect';
          }
        } else if (i === state.userInput.length) {
          className = 'current';
        }

        html += `<span class="${className}">${char}</span>`;
      }
      passageDisplay.innerHTML = html;
    }

    // Start test
    startBtn.addEventListener('click', startTest);
    passageDisplay.addEventListener('click', startTest);

    function startTest() {
      if (state.isTestRunning) return;

      state.isTestRunning = true;
      state.userInput = '';
      state.timeElapsed = 0;
      state.startTime = Date.now();
      startContainer.classList.add('hidden');
      resultsContainer.classList.remove('show');

      loadPassage();
      renderPassage();

      // Focus on passage for keyboard input
      passageDisplay.focus();

      // Add keyboard listener
      document.addEventListener('keydown', handleKeyPress);
      document.addEventListener('keyup', handleKeyUp);

      // Start timer
      state.timerInterval = setInterval(updateTimer, 100);

      // Set test duration based on mode
      if (state.currentMode === 'timed') {
        setTimeout(endTest, 60000);
      }
    }

    function handleKeyPress(e) {
      if (!state.isTestRunning) return;

      const key = e.key;

      if (key === 'Backspace') {
        e.preventDefault();
        state.userInput = state.userInput.slice(0, -1);
      } else if (key.length === 1) {
        state.userInput += key;

        // Check if test is complete for passage mode
        if (state.currentMode === 'passage' && state.userInput.length === state.currentPassage.length) {
          endTest();
        }
      }

      renderPassage();
      updateStats();
    }

    function handleKeyUp(e) {
      if (!state.isTestRunning) return;
      updateStats();
    }

    function updateStats() {
      if (!state.startTime) return;

      const timeInSeconds = Math.max((Date.now() - state.startTime) / 1000, 0.1);
      const minutes = timeInSeconds / 60;

      // Calculate WPM (words = characters / 5)
      const words = state.userInput.length / 5;
      const wpm = Math.round(words / minutes);

      // Calculate accuracy
      let correctChars = 0;
      for (let i = 0; i < state.userInput.length; i++) {
        if (i < state.currentPassage.length && state.userInput[i] === state.currentPassage[i]) {
          correctChars++;
        }
      }
      const accuracy = state.userInput.length > 0 ? Math.round((correctChars / state.userInput.length) * 100) : 0;

      wpmDisplay.textContent = wpm;
      accuracyDisplay.textContent = accuracy + '%';
    }

    function updateTimer() {
      if (!state.startTime) return;

      const timeInSeconds = Math.floor((Date.now() - state.startTime) / 1000);
      const minutes = Math.floor(timeInSeconds / 60);
      const seconds = timeInSeconds % 60;

      timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function endTest() {
      state.isTestRunning = false;
      clearInterval(state.timerInterval);
      document.removeEventListener('keydown', handleKeyPress);
      document.removeEventListener('keyup', handleKeyUp);

      // Calculate final stats
      const timeInSeconds = Math.max((Date.now() - state.startTime) / 1000, 0.1);
      const minutes = timeInSeconds / 60;
      const words = state.userInput.length / 5;
      const finalWpm = Math.round(words / minutes);

      let correctChars = 0;
      for (let i = 0; i < state.userInput.length; i++) {
        if (i < state.currentPassage.length && state.userInput[i] === state.currentPassage[i]) {
          correctChars++;
        }
      }
      const finalAccuracy = state.userInput.length > 0 ? Math.round((correctChars / state.userInput.length) * 100) : 0;

      // Update personal best
      if (finalWpm > state.personalBest) {
        state.personalBest = finalWpm;
        localStorage.setItem('personalBest', finalWpm);
        pbWpmDisplay.textContent = finalWpm;
      }

      // Show results
      document.getElementById('finalWpm').textContent = finalWpm;
      document.getElementById('finalAccuracy').textContent = finalAccuracy + '%';
      document.getElementById('finalChars').textContent = `${correctChars}/${state.userInput.length}`;

      startContainer.classList.add('hidden');
      resultsContainer.classList.add('show');
    }

    goAgainBtn.addEventListener('click', () => {
      resetTest();
      startTest();
    });

    function resetTest() {
      state.isTestRunning = false;
      state.userInput = '';
      state.timeElapsed = 0;
      state.startTime = null;
      clearInterval(state.timerInterval);

      wpmDisplay.textContent = '0';
      accuracyDisplay.textContent = '0%';
      timeDisplay.textContent = '0:00';

      startContainer.classList.remove('hidden');
      resultsContainer.classList.remove('show');

      passageDisplay.innerHTML = '';

      document.removeEventListener('keydown', handleKeyPress);
      document.removeEventListener('keyup', handleKeyUp);
    }

    // Initial load
    loadPassage();
  </script>
</body>
</html>
