<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Professional Typing Speed Test - Measure your WPM and accuracy">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Typing Speed Test | Master Your Speed</title>
  <style>
    /* Importing Sora font from local fil */
    @font-face {
      font-family: 'Sora';
      src: url('C:/Users/KA/Desktop/Typing Project/assets/fonts/Sora/Sora-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900; /* Define a range of weights for variable font */
      font-display: swap;
    }
    @font-face {
      font-family: 'Sora';
      src: url('C:/Users/KA/Desktop/Typing Project/assets/fonts/Sora/static/Sora-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Sora';
      src: url('C:/Users/KA/Desktop/Typing Project/assets/fonts/Sora/static/Sora-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'Sora';
      src: url('C:/Users/KA/Desktop/Typing Project/assets/fonts/Sora/static/Sora-Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: swap;
    }

    /* ===== CSS Variables ===== */
    :root {
      --color-primary: #6366f1; /* Indigo-500 */
      --color-primary-light: #818cf8; /* Indigo-400 */
      --color-success: #10b981; /* Emerald-500 */
      --color-error: #ef4444; /* Red-500 */
      --color-warning: #f59e0b; /* Amber-500 */
      --color-bg: #0f0f0f; /* Near black */
      --color-bg-secondary: #1a1a1a; /* Darker gray */
      --color-bg-tertiary: #262626; /* Medium dark gray */
      --color-text: #f5f5f5; /* Off-white */
      --color-text-secondary: #a3a3a3; /* Gray-400 */
      --color-text-tertiary: #6b7280; /* Gray-500 */
      --color-border: #404040; /* Gray-700 */
      --color-accent: #ec4899; /* Pink-500 */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    /* ===== Global Styles ===== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(135deg, var(--color-bg) 0%, #1a1a2e 100%);
      color: var(--color-text-secondary);
      font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      flex-direction: column;
    }

    .main-wrapper {
      display: flex;
      gap: var(--spacing-md);
      width: 100%;
      max-width: 1400px;
      position: relative;
      z-index: 1;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%); /* Faint blue glow */
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      left: -5%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, transparent 70%); /* Faint pink glow */
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== Container & Layout ===== */
    .container {
      background: rgba(26, 26, 26, 0.8); /* Semi-transparent dark background */
      backdrop-filter: blur(10px); /* Blur effect */
      border: 1px solid rgba(99, 102, 241, 0.1); /* Subtle border */
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      flex: 1;
      min-height: 600px;
      position: relative;
      box-shadow: var(--shadow-xl);
      animation: slideIn 0.6s ease-out;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      width: 280px;
      min-height: 600px;
      box-shadow: var(--shadow-xl);
      animation: slideIn 0.6s ease-out 0.1s backwards;
    }

    .sidebar-content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .sidebar-section h3 {
      font-size: 13px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .stat-card {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.1);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      text-align: center;
      transition: all 0.25s ease;
    }

    .stat-card:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.2);
    }

    .stat-card-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: var(--spacing-xs);
    }

    .stat-card-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
    }

    .difficulty-section,
    .mode-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
    }

    .difficulty-section label,
    .mode-section label {
      font-size: 11px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .sidebar-buttons {
      flex-direction: column;
    }

    .sidebar-buttons .btn {
      width: 100%;
      justify-content: center;
    }

    .settings-btn {
      width: 100%;
      padding: 10px 16px;
      background: rgba(99, 102, 241, 0.15);
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Sora', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .settings-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    /* ===== Modal Styles ===== */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      animation: fadeIn 0.3s ease-out;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: rgba(26, 26, 26, 0.95);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      max-width: 450px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      padding-bottom: var(--spacing-md);
    }

    .modal-header h2 {
      font-size: 22px;
      color: var(--color-text);
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 32px;
      color: var(--color-text-tertiary);
      cursor: pointer;
      transition: color 0.25s ease;
      padding: 0;
      width: 32px;
      height: 32px;
    }

    .modal-close:hover {
      color: var(--color-text);
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .settings-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .settings-group label {
      font-size: 13px;
      color: var(--color-text);
      font-weight: 600;
    }

    .language-buttons,
    .duration-buttons {
      display: flex;
      gap: var(--spacing-sm);
      flex-wrap: wrap;
    }

    .lang-btn,
    .duration-btn {
      flex: 1;
      min-width: 90px;
      padding: 10px 16px;
      background: rgba(99, 102, 241, 0.1);
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-text-secondary);
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Sora', sans-serif;
    }

    .lang-btn:hover,
    .duration-btn:hover {
      border-color: rgba(99, 102, 241, 0.5);
      color: var(--color-text);
      background: rgba(99, 102, 241, 0.15);
    }

    .lang-btn.active,
    .duration-btn.active {
      background: rgba(99, 102, 241, 0.25);
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      font-weight: 600;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
    }

    .custom-duration {
      display: flex;
    }

    .custom-duration input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(99, 102, 241, 0.05);
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-size: 13px;
      font-family: 'Sora', sans-serif;
      transition: all 0.25s ease;
    }

    .custom-duration input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: rgba(99, 102, 241, 0.1);
    }

    .custom-duration input::placeholder {
      color: var(--color-text-tertiary);
    }

    .modal-footer {
      display: flex;
      gap: var(--spacing-sm);
      justify-content: flex-end;
    }

    .modal-btn-primary {
      padding: 10px 32px;
      background: rgba(99, 102, 241, 0.2);
      border: 1.5px solid rgba(99, 102, 241, 0.4);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Sora', sans-serif;
    }

    .modal-btn-primary:hover {
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-lg);
      gap: var(--spacing-lg);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      padding-bottom: var(--spacing-md);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 12px;
      color: var(--color-text-tertiary);
      margin-top: 4px;
      font-weight: 400;
    }

    .logo-icon {
      font-size: 28px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--spacing-xs);
      text-align: right;
    }

    .personal-best {
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .personal-best-icon {
      font-size: 16px;
      animation: pulse-icon 2s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .personal-best-icon {
      font-size: 16px;
    }

    .personal-best-value {
      font-weight: 700;
      font-size: 16px;
      color: var(--color-text);
    }

    /* ===== Stats & Controls Section ===== */
    .stats-controls-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
      padding: var(--spacing-md) 0;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    /* ===== Stats Section (Horizontal) ===== */
    .stats-display {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
      justify-content: center;
      margin-bottom: var(--spacing-xl);
      padding: var(--spacing-md);
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .stat-label {
      font-size: 12px;
      color: var(--color-text-tertiary);
      font-weight: 500;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-primary);
      font-family: 'Sora', monospace;
      min-width: 60px;
    }

    .stat-value.wpm {
      color: var(--color-primary);
    }

    .stat-value.accuracy {
      color: var(--color-accent);
    }

    .stat-value.time {
      color: var(--color-warning);
    }

    /* ===== Controls (Buttons) ===== */
    .controls {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .control-label {
      font-size: 12px;
      color: var(--color-text-tertiary);
      font-weight: 600;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .button-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 7px 14px;
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.25s ease;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(99, 102, 241, 0.1);
      transition: all 0.25s ease;
      z-index: 0;
    }

    .btn:hover {
      border-color: rgba(99, 102, 241, 0.5);
      color: var(--color-text);
      transform: translateY(-1px);
      background: rgba(99, 102, 241, 0.05);
    }

    .btn:hover::before {
      left: 0;
    }

    .btn.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
      font-weight: 600;
    }

    .btn.active::before {
      display: none;
    }

    .btn:active {
      transform: translateY(0px);
    }

    /* ===== Passage Container ===== */
    .passage-container {
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      padding: var(--spacing-lg) 0;
      margin-bottom: var(--spacing-lg);
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .passage-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      pointer-events: none;
    }

    .passage {
      font-size: 20px;
      line-height: 1.8;
      color: var(--color-text-secondary);
      font-weight: 400;
      text-align: center;
      cursor: text;
      letter-spacing: 0.2px;
      position: relative;
      z-index: 2;
      transition: var(--transition);
      font-family: 'Sora', sans-serif;
    }

    .passage:focus {
      outline: none;
    }

    .passage span {
      position: relative;
      display: inline;
      transition: all 0.05s ease;
    }

    .passage span.correct {
      color: var(--color-success);
      font-weight: 500;
    }

    .passage span.incorrect {
      color: var(--color-accent);
      background: rgba(239, 68, 68, 0.08);
      padding: 0 2px;
      border-radius: 2px;
    }

    .passage span.current {
      color: var(--color-primary);
      background: rgba(99, 102, 241, 0.15);
      border-bottom: 2px solid var(--color-primary);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49%, 100% { opacity: 1; }
      50%, 99% { opacity: 0.7; }
    }

    .passage span.remaining {
      color: var(--color-text-tertiary);
    }

    /* ===== Start Button Container ===== */
    .start-button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-lg);
      position: relative;
      z-index: 2;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .start-button {
      padding: 10px 28px;
      background: rgba(99, 102, 241, 0.2);
      border: 1.5px solid rgba(99, 102, 241, 0.4);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: none;
      position: relative;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
    }

    .start-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(99, 102, 241, 0.1);
      transition: all 0.25s ease;
    }

    .start-button:hover::before {
      left: 0;
    }

    .start-button:hover {
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .start-button:active {
      transform: translateY(0px);
    }

    .hint {
      font-size: 13px;
      color: var(--color-text-tertiary);
      text-align: center;
    }

    /* ===== Results Container ===== */
    .results-container {
      display: none;
      position: relative;
      z-index: 2;
      text-align: center;
      animation: slideIn 0.5s ease-out;
    }

    .results-container.show {
      display: block;
    }

    .results-header {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--spacing-md);
      letter-spacing: -0.5px;
    }

    .results-message {
      font-size: 16px;
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-xl);
      line-height: 1.6;
    }

    .results-message.pb-message {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-accent);
      animation: pulse 0.6s ease-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .results-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }

    .results-stat {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.1);
      padding: var(--spacing-lg);
      border-radius: var(--radius-md);
      transition: var(--transition);
    }

    .results-stat:hover {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.2);
      transform: translateY(-4px);
    }

    .results-stat-value {
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--spacing-xs);
    }

    .results-stat-label {
      font-size: 11px;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    /* ===== Buttons ===== */
    .go-again-button,
    .reset-button {
      padding: 10px 28px;
      background: rgba(99, 102, 241, 0.15);
      border: 1.5px solid rgba(99, 102, 241, 0.4);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: none;
      margin: var(--spacing-sm);
      font-family: 'Sora', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .go-again-button::before,
    .reset-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(99, 102, 241, 0.1);
      transition: all 0.25s ease;
    }

    .go-again-button:hover::before,
    .reset-button:hover::before {
      left: 0;
    }

    .go-again-button:hover,
    .reset-button:hover {
      border-color: var(--color-primary);
      color: var(--color-primary-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .go-again-button:active,
    .reset-button:active {
      transform: translateY(0px);
    }

    .go-again-button:hover,
    .reset-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .go-again-button:active,
    .reset-button:active {
      transform: translateY(-1px);
    }

    /* ===== Utility Classes ===== */
    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    /* ===== Loading Animation ===== */
    .loading {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-primary);
      animation: bounce 1.4s infinite;
    }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.5; }
      40% { opacity: 1; }
    }

    /* ===== Responsive Design ===== */
    @media (max-width: 1024px) {
      .main-wrapper {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
      }

      .sidebar-content {
        flex-direction: row;
        gap: var(--spacing-lg);
        flex-wrap: wrap;
      }

      .sidebar-section {
        flex: 1;
        min-width: 150px;
      }
    }

    @media (max-width: 768px) {
      :root {
        --spacing-lg: 1.5rem;
        --spacing-xl: 2rem;
      }

      body {
        padding: var(--spacing-sm);
        flex-direction: column;
      }

      .main-wrapper {
        flex-direction: column-reverse;
      }

      .container {
        padding: var(--spacing-md);
        border-radius: var(--radius-md);
        min-height: auto;
      }

      .sidebar {
        min-height: auto;
      }

      .header {
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .logo {
        font-size: 22px;
      }

      .logo-icon {
        font-size: 28px;
      }

      .header-info {
        align-items: center;
      }

      .stats-display {
        gap: var(--spacing-sm);
      }

      .stat-item {
        padding: var(--spacing-sm);
      }

      .stat-value {
        font-size: 28px;
      }

      .passage {
        font-size: 16px;
        line-height: 1.7;
      }

      .passage-container {
        padding: var(--spacing-md);
        min-height: 180px;
      }

      .results-stats {
        gap: var(--spacing-sm);
      }

      .results-header {
        font-size: 26px;
      }

      .results-stat-value {
        font-size: 28px;
      }

      .start-button,
      .go-again-button,
      .reset-button {
        font-size: 15px;
        padding: 11px 24px;
      }

      .modal-content {
        max-width: 90%;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      :root {
        --spacing-md: 1rem;
        --spacing-lg: 1.25rem;
        --spacing-xl: 1.5rem;
      }

      body {
        padding: var(--spacing-sm);
      }

      .container {
        padding: var(--spacing-md);
      }

      .header {
        flex-direction: column;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-lg);
      }

      .logo {
        font-size: 20px;
      }

      .logo-icon {
        font-size: 26px;
      }

      .header-info {
        align-items: center;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      .button-group {
        width: 100%;
        justify-content: space-between;
      }

      .btn {
        flex: 1;
        padding: 8px 12px;
        font-size: 12px;
      }

      .passage {
        font-size: 15px;
        line-height: 1.6;
      }

      .passage-container {
        padding: var(--spacing-md);
        min-height: 160px;
      }

      .results-stats {
        grid-template-columns: 1fr;
      }

      .results-header {
        font-size: 24px;
      }

      .results-stat-value {
        font-size: 24px;
      }

      .start-button,
      .go-again-button,
      .reset-button {
        width: 100%;
        font-size: 14px;
        padding: 10px 20px;
      }

      .hint {
        font-size: 12px;
      }
    }

    /* ===== Accessibility ===== */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== Focus Styles ===== */
    .btn:focus-visible,
    .start-button:focus-visible,
    .go-again-button:focus-visible,
    .reset-button:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    /* ===== Dark Mode (default) ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0a0a0a;
        --color-bg-secondary: #1a1a1a;
      }
    }
  </style>
</head>
<body>
  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="settingsTitle">Settings</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Language Selection -->
        <div class="settings-group">
          <label id="langLabel">Language / Язык / Dil</label>
          <div class="language-buttons">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="ru">Русский</button>
            <button class="lang-btn" data-lang="tk">Türkmençe</button>
          </div>
        </div>

        <!-- Duration Selection -->
        <div class="settings-group">
          <label id="durationLabel">Test Duration (seconds)</label>
          <div class="duration-buttons">
            <button class="duration-btn" data-duration="30">30s</button>
            <button class="duration-btn active" data-duration="60">60s</button>
            <button class="duration-btn" data-duration="90">90s</button>
            <button class="duration-btn" data-duration="120">2 min</button>
          </div>
          <div class="custom-duration">
            <input type="number" id="customDuration" min="10" max="300" placeholder="Custom (10-300s)" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn-primary" id="modalConfirm" class="modal-btn-confirm">OK</button>
      </div>
    </div>
  </div>

  <div class="main-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-content">
        <div class="sidebar-section">
          <h3 id="statsLabel">Statistics</h3>
          <div class="stat-card">
            <div class="stat-card-label" id="pbLabel">Personal Best</div>
            <div class="stat-card-value" id="pbWpm">0 WPM</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label" id="testTimeLabel">Test Duration</div>
            <div class="stat-card-value" id="testDurationDisplay">60s</div>
          </div>
        </div>

        <div class="sidebar-section">
          <h3 id="controlsLabel">Controls</h3>
          <div class="difficulty-section">
            <label id="diffLabel">Difficulty</label>
            <div class="button-group sidebar-buttons">
              <button class="btn difficulty-btn active" data-difficulty="easy">Easy</button>
              <button class="btn difficulty-btn" data-difficulty="medium">Medium</button>
              <button class="btn difficulty-btn" data-difficulty="hard">Hard</button>
            </div>
          </div>
          <div class="mode-section">
            <label id="modeLabel">Mode</label>
            <div class="button-group sidebar-buttons">
              <button class="btn mode-btn active" data-mode="timed">Timed</button>
              <button class="btn mode-btn" data-mode="passage">Passage</button>
            </div>
          </div>
        </div>

        <div class="sidebar-section">
          <button class="settings-btn" id="settingsBtn">⚙️ <span id="settingsLabel">Settings</span></button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="container">
      <!-- Header Section -->
      <div class="header">
        <div>
          <div class="logo">
            <span class="logo-icon">⌨️</span>
            <span id="appTitle">Typing Speed Test</span>
          </div>
          <div class="logo-subtitle" id="subtitle">Type as fast as you can</div>
        </div>
      </div>

      <!-- Stats Section -->
      <div class="stats-display">
        <div class="stat-item">
          <div class="stat-label">WPM</div>
          <div class="stat-value wpm" id="wpmDisplay">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value accuracy" id="accuracyDisplay">0%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Time</div>
          <div class="stat-value time" id="timeDisplay">0:00</div>
        </div>
      </div>

      <!-- Passage Container -->
      <div class="passage-container">
        <div class="passage" id="passageDisplay" role="region" aria-label="Typing area"></div>
      </div>

      <!-- Start Button Container -->
      <div class="start-button-container" id="startContainer">
        <button class="start-button" id="startBtn" data-lang="start">Start Typing Test</button>
        <p class="hint" id="hint">Click the text and start typing</p>
      </div>

      <!-- Results Container -->
      <div class="results-container" id="resultsContainer">
        <div class="results-header" id="completeLabel">Test Complete!</div>
        <div class="results-message" id="resultsMessage">Great effort! Keep practicing to improve.</div>
        <div class="results-stats">
          <div class="results-stat">
            <div class="results-stat-value" id="finalWpm">0</div>
            <div class="results-stat-label" id="wpmLabelResult">WPM</div>
          </div>
          <div class="results-stat">
            <div class="results-stat-value" id="finalAccuracy">0%</div>
            <div class="results-stat-label" id="accuracyLabelResult">Accuracy</div>
          </div>
          <div class="results-stat">
            <div class="results-stat-value" id="finalChars">0</div>
            <div class="results-stat-label" id="charsLabelResult">Correct Chars</div>
          </div>
        </div>
        <div>
          <button class="go-again-button" id="goAgainBtn">Restart Test ↻</button>
          <button class="reset-button" id="resetBtn">Change Settings</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== Translations =====
    const translations = {
      en: {
        appTitle: 'Typing Speed Test',
        subtitle: 'Type as fast as you can',
        statsLabel: 'Statistics',
        pbLabel: 'Personal Best',
        testTimeLabel: 'Test Duration',
        controlsLabel: 'Controls',
        diffLabel: 'Difficulty',
        modeLabel: 'Mode',
        settingsLabel: 'Settings',
        settingsTitle: 'Settings',
        langLabel: 'Language',
        durationLabel: 'Test Duration (seconds)',
        startBtn: 'Start Typing Test',
        hint: 'Click the text and start typing',
        completeLabel: 'Test Complete!',
        wpmLabelResult: 'WPM',
        accuracyLabelResult: 'Accuracy',
        charsLabelResult: 'Correct Chars',
        goAgainBtn: 'Restart Test ↻',
        changeSettingsBtn: 'Change Settings'
      },
      ru: {
        appTitle: 'Тест Скорости Печати',
        subtitle: 'Печатайте как можно быстрее',
        statsLabel: 'Статистика',
        pbLabel: 'Лучший Результат',
        testTimeLabel: 'Длительность',
        controlsLabel: 'Управление',
        diffLabel: 'Сложность',
        modeLabel: 'Режим',
        settingsLabel: 'Настройки',
        settingsTitle: 'Настройки',
        langLabel: 'Язык',
        durationLabel: 'Длительность теста (секунды)',
        startBtn: 'Начать Тест',
        hint: 'Нажмите на текст и начните печатать',
        completeLabel: 'Тест Завершён!',
        wpmLabelResult: 'СПМ',
        accuracyLabelResult: 'Точность',
        charsLabelResult: 'Верных Символов',
        goAgainBtn: 'Попробовать Снова ↻',
        changeSettingsBtn: 'Изменить Настройки'
      },
      tk: {
        appTitle: 'Çap Tizligini Synamak',
        subtitle: 'Mümkin boldugyça çap ediň',
        statsLabel: 'Statistika',
        pbLabel: 'Iň Ýokary Netije',
        testTimeLabel: 'Wagt',
        controlsLabel: 'Dolandyryş',
        diffLabel: 'Çetin Derejesi',
        modeLabel: 'Режim',
        settingsLabel: 'Sazlamalar',
        settingsTitle: 'Sazlamalar',
        langLabel: 'Dil',
        durationLabel: 'Synaw wagty (sekund)',
        startBtn: 'Synawa Başla',
        hint: 'Tekste basyň we çap ediň',
        completeLabel: 'Synaw Tamamlandy!',
        wpmLabelResult: 'ÇPM',
        accuracyLabelResult: 'Hasyllygy',
        charsLabelResult: 'Dogry Nyşan',
        goAgainBtn: 'Gaýtadan Synayň ↻',
        changeSettingsBtn: 'Sazlamalary Üýtget'
      }
    };

    class TypingSpeedTest {
      constructor() {
        this.currentLanguage = localStorage.getItem('language') || 'en';
        this.initializeState();
        this.cacheElements();
        this.setupModal();
        this.attachEventListeners();
        this.loadPersonalBest();
        this.loadPassage();
        this.updateUI();
      }

      initializeState() {
        this.state = {
          isTestRunning: false,
          isPaused: false,
          currentDifficulty: 'easy',
          currentMode: 'timed',
          timeElapsed: 0,
          currentPassage: '',
          userInput: '',
          startTime: null,
          timerInterval: null,
          personalBest: 0,
          testDuration: (parseInt(localStorage.getItem('testDuration')) || 60) * 1000,
          stats: {
            wpm: 0,
            accuracy: 0,
            correctChars: 0,
            totalChars: 0
          }
        };
      }

      cacheElements() {
        this.elements = {
          passageDisplay: document.getElementById('passageDisplay'),
          startBtn: document.getElementById('startBtn'),
          startContainer: document.getElementById('startContainer'),
          resultsContainer: document.getElementById('resultsContainer'),
          wpmDisplay: document.getElementById('wpmDisplay'),
          accuracyDisplay: document.getElementById('accuracyDisplay'),
          timeDisplay: document.getElementById('timeDisplay'),
          pbWpmDisplay: document.getElementById('pbWpm'),
          testDurationDisplay: document.getElementById('testDurationDisplay'),
          difficultyBtns: document.querySelectorAll('.difficulty-btn'),
          modeBtns: document.querySelectorAll('.mode-btn'),
          goAgainBtn: document.getElementById('goAgainBtn'),
          resetBtn: document.getElementById('resetBtn'),
          resultsMessage: document.getElementById('resultsMessage'),
          finalWpm: document.getElementById('finalWpm'),
          finalAccuracy: document.getElementById('finalAccuracy'),
          finalChars: document.getElementById('finalChars'),
          settingsBtn: document.getElementById('settingsBtn'),
          settingsModal: document.getElementById('settingsModal'),
          modalClose: document.getElementById('modalClose'),
          modalConfirm: document.getElementById('modalConfirm'),
          langBtns: document.querySelectorAll('.lang-btn'),
          durationBtns: document.querySelectorAll('.duration-btn'),
          customDuration: document.getElementById('customDuration')
        };
      }

      setupModal() {
        // Set active language button
        this.elements.langBtns.forEach(btn => {
          if (btn.dataset.lang === this.currentLanguage) {
            btn.classList.add('active');
          }
        });

        // Set active duration button
        const currentDurationSecs = this.state.testDuration / 1000;
        this.elements.durationBtns.forEach(btn => {
          if (parseInt(btn.dataset.duration) === currentDurationSecs) {
            btn.classList.add('active');
          }
        });
      }

      attachEventListeners() {
        // Difficulty selection
        this.elements.difficultyBtns.forEach(btn => {
          btn.addEventListener('click', () => this.selectDifficulty(btn));
        });

        // Mode selection
        this.elements.modeBtns.forEach(btn => {
          btn.addEventListener('click', () => this.selectMode(btn));
        });

        // Start test
        this.elements.startBtn.addEventListener('click', () => this.startTest());

        // End test buttons
        this.elements.goAgainBtn.addEventListener('click', () => this.startTest());
        this.elements.resetBtn.addEventListener('click', () => this.resetTest());

        // Settings modal
        this.elements.settingsBtn.addEventListener('click', () => this.openModal());
        this.elements.modalClose.addEventListener('click', () => this.closeModal());
        this.elements.modalConfirm.addEventListener('click', () => this.saveSettings());

        // Language selection in modal
        this.elements.langBtns.forEach(btn => {
          btn.addEventListener('click', () => this.selectLanguage(btn));
        });

        // Duration selection in modal
        this.elements.durationBtns.forEach(btn => {
          btn.addEventListener('click', () => this.selectDuration(btn));
        });

        // Custom duration input
        this.elements.customDuration.addEventListener('change', (e) => {
          const value = parseInt(e.target.value);
          if (value >= 10 && value <= 300) {
            this.elements.durationBtns.forEach(btn => btn.classList.remove('active'));
            this.elements.customDuration.dataset.selected = value;
          }
        });

        // Global keyboard
        document.addEventListener('keydown', (e) => this.handleGlobalKeyboardShortcuts(e));

        // Click outside modal to close
        this.elements.settingsModal.addEventListener('click', (e) => {
          if (e.target === this.elements.settingsModal) {
            this.closeModal();
          }
        });
      }

      selectLanguage(btn) {
        this.elements.langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.currentLanguage = btn.dataset.lang;
      }

      selectDuration(btn) {
        this.elements.durationBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.elements.customDuration.value = '';
        delete this.elements.customDuration.dataset.selected;
      }

      openModal() {
        this.elements.settingsModal.classList.add('show');
      }

      closeModal() {
        this.elements.settingsModal.classList.remove('show');
      }

      saveSettings() {
        localStorage.setItem('language', this.currentLanguage);
        
        // Save duration
        let duration = 60;
        const activeBtn = document.querySelector('.duration-btn.active');
        if (activeBtn) {
          duration = parseInt(activeBtn.dataset.duration);
        } else if (this.elements.customDuration.dataset.selected) {
          duration = parseInt(this.elements.customDuration.dataset.selected);
        } else if (this.elements.customDuration.value) {
          const value = parseInt(this.elements.customDuration.value);
          if (value >= 10 && value <= 300) {
            duration = value;
          }
        }
        
        localStorage.setItem('testDuration', duration);
        this.state.testDuration = duration * 1000;
        
        this.closeModal();
        this.updateUI();
      }

      updateUI() {
        const t = translations[this.currentLanguage];
        
        // Update all text elements
        document.getElementById('appTitle').textContent = t.appTitle;
        document.getElementById('subtitle').textContent = t.subtitle;
        document.getElementById('statsLabel').textContent = t.statsLabel;
        document.getElementById('pbLabel').textContent = t.pbLabel;
        document.getElementById('testTimeLabel').textContent = t.testTimeLabel;
        document.getElementById('controlsLabel').textContent = t.controlsLabel;
        document.getElementById('diffLabel').textContent = t.diffLabel;
        document.getElementById('modeLabel').textContent = t.modeLabel;
        document.getElementById('settingsBtn').innerHTML = `⚙️ <span>${t.settingsLabel}</span>`;
        document.getElementById('settingsTitle').textContent = t.settingsTitle;
        document.getElementById('langLabel').textContent = t.langLabel;
        document.getElementById('durationLabel').textContent = t.durationLabel;
        document.getElementById('startBtn').textContent = t.startBtn;
        document.getElementById('hint').textContent = t.hint;
        document.getElementById('completeLabel').textContent = t.completeLabel;
        document.getElementById('wpmLabelResult').textContent = t.wpmLabelResult;
        document.getElementById('accuracyLabelResult').textContent = t.accuracyLabelResult;
        document.getElementById('charsLabelResult').textContent = t.charsLabelResult;
        document.getElementById('goAgainBtn').textContent = t.goAgainBtn;
        document.getElementById('resetBtn').textContent = t.changeSettingsBtn;
        
        // Update test duration display
        const durationSecs = this.state.testDuration / 1000;
        document.getElementById('testDurationDisplay').textContent = 
          durationSecs >= 60 ? Math.round(durationSecs / 60) + 'm' : durationSecs + 's';
      }

      selectDifficulty(btn) {
        if (this.state.isTestRunning) return;

        this.elements.difficultyBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.state.currentDifficulty = btn.dataset.difficulty;
        this.resetTest();
      }

      selectMode(btn) {
        if (this.state.isTestRunning) return;

        this.elements.modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        this.state.currentMode = btn.dataset.mode;
        this.resetTest();
      }

      async loadPassage() {
        try {
          const response = await fetch('data.json');
          if (!response.ok) throw new Error('Failed to load passage');
          
          const data = await response.json();
          const passages = data[this.state.currentDifficulty];
          
          if (!passages || passages.length === 0) {
            throw new Error('No passages available for this difficulty');
          }

          const randomPassage = passages[Math.floor(Math.random() * passages.length)];
          this.state.currentPassage = randomPassage.text;
          this.renderPassage();
        } catch (error) {
          console.error('Error loading passage:', error);
          this.state.currentPassage = 'The quick brown fox jumps over the lazy dog. Technology is advancing rapidly every single day.';
          this.renderPassage();
        }
      }

      renderPassage() {
        let html = '';
        for (let i = 0; i < this.state.currentPassage.length; i++) {
          const char = this.state.currentPassage[i];
          let className = 'remaining';

          if (i < this.state.userInput.length) {
            className = this.state.userInput[i] === char ? 'correct' : 'incorrect';
          } else if (i === this.state.userInput.length) {
            className = 'current';
          }

          html += `<span class="${className}">${char}</span>`;
        }
        this.elements.passageDisplay.innerHTML = html;
        
        // Scroll to current character if it's off-screen
        const currentSpan = this.elements.passageDisplay.querySelector('.current');
        if (currentSpan) {
          const passageRect = this.elements.passageDisplay.getBoundingClientRect();
          const currentSpanRect = currentSpan.getBoundingClientRect();
          
          if (currentSpanRect.top < passageRect.top || currentSpanRect.bottom > passageRect.bottom) {
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      }

      startTest() {
        if (this.state.isTestRunning) return;

        this.state.isTestRunning = true;
        this.state.userInput = '';
        this.state.timeElapsed = 0;
        this.state.startTime = Date.now();

        this.elements.startContainer.classList.add('hidden');
        this.elements.resultsContainer.classList.remove('show');

        this.loadPassage();
        this.elements.passageDisplay.focus();

        // Bind the handler and store reference
        this.keyPressHandler = (e) => this.handleKeyPress(e);
        document.addEventListener('keydown', this.keyPressHandler);

        // Start timer
        this.state.timerInterval = setInterval(() => this.updateTimer(), 100);

        // Set test duration for timed mode
        if (this.state.currentMode === 'timed') {
          this.testTimeoutId = setTimeout(() => {
            if (this.state.isTestRunning) {
              this.endTest();
            }
          }, this.state.testDuration);
        }
      }

      handleKeyPress(e) {
        if (!this.state.isTestRunning) return;

        const key = e.key;

        if (key === 'Backspace') {
          e.preventDefault();
          this.state.userInput = this.state.userInput.slice(0, -1);
        } else if (key === 'Escape') {
          e.preventDefault();
          this.endTest();
          return;
        } else if (key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
          this.state.userInput += key;

          if (this.state.currentMode === 'passage' && this.state.userInput.length === this.state.currentPassage.length) {
            this.endTest();
            return;
          }
        } else {
          return;
        }

        this.renderPassage();
        this.updateStats();
      }

      handleGlobalKeyboardShortcuts(e) {
        if (!this.state.isTestRunning && e.altKey) {
          if (e.key === '1') {
            e.preventDefault();
            this.elements.difficultyBtns[0].click();
          } else if (e.key === '2') {
            e.preventDefault();
            this.elements.difficultyBtns[1].click();
          } else if (e.key === '3') {
            e.preventDefault();
            this.elements.difficultyBtns[2].click();
          }
        }
      }

      updateStats() {
        if (!this.state.startTime) return;

        const timeInSeconds = Math.max((Date.now() - this.state.startTime) / 1000, 1);
        const minutes = timeInSeconds / 60;

        const wordsTyped = this.state.userInput.length / 5;
        const wpm = Math.round(wordsTyped / minutes);

        let correctChars = 0;
        for (let i = 0; i < this.state.userInput.length; i++) {
          if (i < this.state.currentPassage.length && this.state.userInput[i] === this.state.currentPassage[i]) {
            correctChars++;
          }
        }
        const accuracy = this.state.userInput.length > 0 
          ? Math.round((correctChars / this.state.userInput.length) * 100) 
          : 0;

        this.state.stats.wpm = wpm;
        this.state.stats.accuracy = accuracy;
        this.state.stats.correctChars = correctChars;
        this.state.stats.totalChars = this.state.userInput.length;

        this.elements.wpmDisplay.textContent = wpm;
        this.elements.accuracyDisplay.textContent = accuracy + '%';
      }

      updateTimer() {
        if (!this.state.startTime) return;

        const timeInSeconds = Math.floor((Date.now() - this.state.startTime) / 1000);
        const minutes = Math.floor(timeInSeconds / 60);
        const seconds = timeInSeconds % 60;

        this.elements.timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }

      endTest() {
        if (!this.state.isTestRunning) return;

        this.state.isTestRunning = false;
        clearInterval(this.state.timerInterval);
        if (this.testTimeoutId) clearTimeout(this.testTimeoutId);
        if (this.keyPressHandler) {
          document.removeEventListener('keydown', this.keyPressHandler);
        }

        const timeInSeconds = Math.max((Date.now() - this.state.startTime) / 1000, 1);
        const minutes = timeInSeconds / 60;
        const words = this.state.userInput.length / 5;
        const finalWpm = Math.round(words / minutes);

        let correctChars = 0;
        for (let i = 0; i < this.state.userInput.length; i++) {
          if (i < this.state.currentPassage.length && this.state.userInput[i] === this.state.currentPassage[i]) {
            correctChars++;
          }
        }
        const finalAccuracy = this.state.userInput.length > 0 
          ? Math.round((correctChars / this.state.userInput.length) * 100) 
          : 0;

        const isNewRecord = finalWpm > this.state.personalBest;
        if (isNewRecord) {
          this.state.personalBest = finalWpm;
          localStorage.setItem('personalBest', finalWpm);
          this.elements.pbWpmDisplay.textContent = finalWpm + ' WPM';
        }

        this.elements.finalWpm.textContent = finalWpm;
        this.elements.finalAccuracy.textContent = finalAccuracy + '%';
        this.elements.finalChars.textContent = correctChars;

        const t = translations[this.currentLanguage];
        const message = this.generateResultsMessage(finalWpm, finalAccuracy, isNewRecord, t);
        this.elements.resultsMessage.textContent = message;
        if (isNewRecord) {
          this.elements.resultsMessage.classList.add('pb-message');
        } else {
          this.elements.resultsMessage.classList.remove('pb-message');
        }

        this.elements.startContainer.classList.add('hidden');
        this.elements.resultsContainer.classList.add('show');
      }

      generateResultsMessage(wpm, accuracy, isNewRecord, t) {
        if (isNewRecord) {
          return `🎉 ${this.currentLanguage === 'ru' ? 'Новый рекорд!' : this.currentLanguage === 'tk' ? 'Täze rekord!' : 'New Record!'} ${wpm} WPM, ${accuracy}% ${t.accuracyLabelResult.toLowerCase()}!`;
        } else if (wpm > 60) {
          return this.currentLanguage === 'ru' ? 'Отлично! Продолжай в том же духе.' : this.currentLanguage === 'tk' ? 'Oňat! Ýokarda barmagiň.' : 'Excellent! Keep pushing.';
        } else if (wpm > 40) {
          return this.currentLanguage === 'ru' ? 'Хорошо! Ты улучшаешься.' : this.currentLanguage === 'tk' ? 'Gowy! Ýakşarýarsan.' : 'Great work! Keep practicing.';
        } else if (wpm > 20) {
          return this.currentLanguage === 'ru' ? 'Хороший старт! Продолжай тренироваться.' : this.currentLanguage === 'tk' ? 'Gowy başlangyt! Praktika edin.' : 'Good effort! Practice makes perfect.';
        } else {
          return this.currentLanguage === 'ru' ? 'Продолжай тренироваться!' : this.currentLanguage === 'tk' ? 'Pratika etmegiň!' : 'Keep practicing to improve!';
        }
      }

      resetTest() {
        this.state.isTestRunning = false;
        this.state.userInput = '';
        this.state.timeElapsed = 0;
        this.state.startTime = null;
        clearInterval(this.state.timerInterval);
        if (this.testTimeoutId) clearTimeout(this.testTimeoutId);

        this.elements.wpmDisplay.textContent = '0';
        this.elements.accuracyDisplay.textContent = '0%';
        this.elements.timeDisplay.textContent = '0:00';

        this.elements.startContainer.classList.remove('hidden');
        this.elements.resultsContainer.classList.remove('show');
        this.elements.resultsMessage.classList.remove('pb-message');

        this.elements.passageDisplay.innerHTML = '';
        this.loadPassage();

        if (this.keyPressHandler) {
          document.removeEventListener('keydown', this.keyPressHandler);
        }
      }

      loadPersonalBest() {
        const best = localStorage.getItem('personalBest');
        if (best) {
          this.state.personalBest = parseInt(best, 10);
          this.elements.pbWpmDisplay.textContent = best + ' WPM';
        } else {
          this.elements.pbWpmDisplay.textContent = '0 WPM';
        }
      }
    }

    let app;
    document.addEventListener('DOMContentLoaded', () => {
      app = new TypingSpeedTest();
    });
  </script>
</body>
</html>
